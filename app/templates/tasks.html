{% extends "base.html" %}
{% block title %} Tasks {% endblock %}
{% block content %}
<div class="task-card">
    <h2>Your Tasks</h2>

    <form method="POST" action="{{ url_for('tasks.add_task') }}" class="task-form">
        <input
            type="text"
            name="title"
            placeholder="Enter task title"
            required
        >
        <button type="submit">Add</button>
    </form>

    {% if tasks %}
    <form method="POST" action="{{ url_for('tasks.clear_tasks') }}">
        <button type="submit" class="btn-clear">Clear All Tasks</button>
    </form>

    <table class="task-table">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Task</th>
                <th>Status</th>
                <th>Change</th>
            </tr>
        </thead>

        <tbody>
        {% for task in tasks %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ task.title }}</td>

                <td>
                    <span class="status-badge">
                        {{ task.status }}
                    </span>
                </td>

                <td>
                    <form action="{{ url_for('tasks.toggle_task', task_id=task.id) }}" method="POST">
                        <button class="btn-next">Next</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% endif %}
</div>
{% endblock %}
